{% extends 'base.html' %}

{% block content %}
<div class="task-display" id="task-container">
  <p id="task-text">Inicjalizacja badania...</p>
</div>

<div id="eeg-overlay" class="eeg-saving-overlay" style="display:none;">
  <div class="eeg-saving-box">
    <div class="sound-pulse"></div>
    <p>Zapisuję odcisk mózgu...</p>
  </div>
</div>

<script>
  const wrapper    = document.querySelector('.app-wrapper');
  const container  = document.getElementById('task-container');
  const USER_ID    = {{ user_id }};
  const NEXT_URL   = "{{ next_url }}";

  if (wrapper) wrapper.classList.add('is-task');

  const stimuli = [
    { type: 'color', value: '#ff0000' },
    { type: 'image', value: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80' },
    { type: 'sound', value: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
    { type: 'color', value: '#0000ff' },
    { type: 'sound', value: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
    { type: 'image', value: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80' },
    { type: 'color', value: '#00ff00' }
  ];

  let idx = 0;
  let currentAudio = null;

  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }

  function showStimulus() {
    const s = stimuli[idx];
    container.innerHTML = '';
    container.style.backgroundColor = '#000';
    stopAudio();

    if (s.type === 'color') {
      const d = document.createElement('div');
      d.className = 'stimulus-color';
      d.style.backgroundColor = s.value;
      container.appendChild(d);
    } else if (s.type === 'image') {
      const img = document.createElement('img');
      img.src = s.value;
      img.className = 'stimulus-image';
      container.appendChild(img);
    } else if (s.type === 'sound') {
      const d = document.createElement('div');
      d.className = 'stimulus-sound';
      d.innerHTML = '<div class="sound-pulse"></div>';
      container.appendChild(d);
      currentAudio = new Audio(s.value);
      currentAudio.play().catch(() => {});
    }
  }

  function countdown(n, onDone) {
    if (n === 3) stopAudio();
    if (n > 0) {
      container.style.backgroundColor = '#000';
      container.innerHTML = `<div class="countdown">${n}</div>`;
      setTimeout(() => countdown(n - 1, onDone), 1000);
    } else {
      onDone();
    }
  }

  async function finishTask() {
    stopAudio();
    if (wrapper) wrapper.classList.remove('is-task');

    // Show saving overlay
    document.getElementById('eeg-overlay').style.display = 'flex';

    await fetch('/api/eeg/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: USER_ID }),
    }).catch(() => {});

    window.location.href = NEXT_URL;
  }

  function runSequence() {
    showStimulus();
    const dur = stimuli[idx].type === 'color' ? 5000 : 10000;
    setTimeout(() => {
      if (idx === stimuli.length - 1) {
        finishTask();
      } else {
        countdown(3, () => { idx++; runSequence(); });
      }
    }, dur);
  }

  // Start EEG recording, then begin stimuli after short delay
  fetch('/api/eeg/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: USER_ID }),
  }).catch(() => {});

  countdown(3, () => runSequence());
</script>
{% endblock %}
