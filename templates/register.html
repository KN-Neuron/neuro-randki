{% extends 'base.html' %}

{% block content %}
<h2 class="animate-fade">Rejestracja graczy</h2>
<form method="post">
    <div class="flex-row">
        <div class="user-form animate-slide-1">
            <h3>Gracz 1</h3>
            <div class="form-group">
                <label>Nickname:</label>
                <input type="text" name="nick1" required placeholder="np. CyberPunk">
            </div>
            <div class="form-group">
                <label>Wiek:</label>
                <input type="number" name="age1" placeholder="opcjonalnie">
            </div>
            <div class="form-group">
                <label>Płeć:</label>
                <select name="gender1">
                    <option value="">Wybierz...</option>
                    <option value="M">Mężczyzna</option>
                    <option value="K">Kobieta</option>
                    <option value="I">Inna</option>
                </select>
            </div>
        </div>
        <div class="user-form animate-slide-2">
            <h3>Gracz 2</h3>
            <div class="form-group">
                <label>Nickname:</label>
                <input type="text" name="nick2" required placeholder="np. BioHacker">
            </div>
            <div class="form-group">
                <label>Wiek:</label>
                <input type="number" name="age2" placeholder="opcjonalnie">
            </div>
            <div class="form-group">
                <label>Płeć:</label>
                <select name="gender2">
                    <option value="">Wybierz...</option>
                    <option value="M">Mężczyzna</option>
                    <option value="K">Kobieta</option>
                    <option value="I">Inna</option>
                </select>
            </div>
        </div>
    </div>
    <button type="submit" class="animate-slide-3">ROZPOCZNIJ TEST</button>
</form>
{% endblock %}
