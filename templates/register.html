{% extends 'base.html' %}

{% block content %}
<h2 class="animate-fade">Rejestracja graczy</h2>
<p class="subtitle animate-fade">Sprawdź czy wasze serca nadają na tych samych falach</p>

<form method="post">
    <div class="flex-row">
        <div class="user-form animate-slide-1">
            <h3><svg class="player-icon" aria-hidden="true"><use href="#heart-with-stars"></use></svg> Gracz 1</h3>
            <div class="form-group">
                <label>Nickname:</label>
                <input type="text" name="nick1" required placeholder="np. CyberCutie">
            </div>
        </div>
        <div class="user-form animate-slide-2">
            <h3><svg class="player-icon" aria-hidden="true"><use href="#heart-with-stars"></use></svg> Gracz 2</h3>
            <div class="form-group">
                <label>Nickname:</label>
                <input type="text" name="nick2" required placeholder="np. PixelPrincess">
            </div>
        </div>
    </div>
    <div class="animate-slide-3">
        <button type="submit" class="cta-heart-btn">
            <img src="{{ url_for('static', filename='assets/CTA_Button.svg') }}" alt="" class="cta-bg">
            <span class="cta-text">ROZPOCZNIJ<br>TEST</span>
        </button>
        <div class="solo-link-row">
            <a href="{{ url_for('solo') }}" class="back-link">🧠 Chcę dodać tylko swój zapis (tryb solo)</a>
            <a href="{{ url_for('graph') }}" class="back-link">↗ Zobacz graf przyjaźni</a>
        </div>
    </div>
</form>
{% endblock %}
