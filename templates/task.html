{% extends 'base.html' %}

{% block content %}
<div class="task-display" id="task-container">
    <!-- Stimulus will be injected here -->
    <p id="task-text">Inicjalizacja badania...</p>
</div>

<script>
    const wrapper = document.querySelector('.app-wrapper');
    if (wrapper) wrapper.classList.add('is-task');

    const container = document.getElementById('task-container');

    const stimuli = [
        { type: 'color', value: '#ff0000' },
        { type: 'image', value: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80' },
        { type: 'sound', value: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
        { type: 'color', value: '#0000ff' },
        { type: 'sound', value: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
        { type: 'image', value: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80' },
        { type: 'color', value: '#00ff00' }
    ];

    let currentStimulusIndex = 0;
    let currentAudio = null;
    let isSequenceRunning = false;

    function stopCurrentAudio() {
        if (currentAudio) {
            console.log("Stopping audio:", currentAudio.src);
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
    }

    function showNextStimulus() {
        const stimulus = stimuli[currentStimulusIndex];
        container.innerHTML = '';
        container.style.backgroundColor = '#000';
        
        stopCurrentAudio();
        
        if (stimulus.type === 'color') {
            const colorDiv = document.createElement('div');
            colorDiv.className = 'stimulus-color';
            colorDiv.style.backgroundColor = stimulus.value;
            container.appendChild(colorDiv);
        } else if (stimulus.type === 'image') {
            const img = document.createElement('img');
            img.src = stimulus.value;
            img.className = 'stimulus-image';
            container.appendChild(img);
        } else if (stimulus.type === 'sound') {
            const soundDiv = document.createElement('div');
            soundDiv.className = 'stimulus-sound';
            soundDiv.innerHTML = '<div class="sound-pulse"></div>';
            container.appendChild(soundDiv);
            
            console.log("Attempting to play audio:", stimulus.value);
            currentAudio = new Audio(stimulus.value);
            currentAudio.play()
                .then(() => console.log("Playback started successfully"))
                .catch(e => {
                    console.error("Audio playback failed or was interrupted:", e);
                });
        }
    }

    function runSequence() {
        showNextStimulus();

        const stimulus = stimuli[currentStimulusIndex];
        const duration = stimulus.type === 'color' ? 5000 : 10000;

        setTimeout(() => {
            if (currentStimulusIndex === stimuli.length - 1) {
                stopCurrentAudio();
                if (wrapper) wrapper.classList.remove('is-task');
                window.location.href = "{{ url_for('results') }}";
            } else {
                startCountdown(3);
            }
        }, duration);
    }

    function startCountdown(seconds) {
        if (seconds === 3) stopCurrentAudio();
        
        if (seconds > 0) {
            container.style.backgroundColor = '#000';
            container.innerHTML = `<div class="countdown">${seconds}</div>`;
            setTimeout(() => startCountdown(seconds - 1), 1000);
        } else {
            if (isSequenceRunning) {
                currentStimulusIndex++;
            }
            isSequenceRunning = true;
            runSequence();
        }
    }

    function startWithCountdown() {
        container.style.backgroundColor = '#000';
        startCountdown(3);
    }

    startWithCountdown();
</script>
{% endblock %}
