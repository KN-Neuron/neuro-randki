{% extends 'base.html' %}

{% block content %}
<h2 class="animate-fade">Przygotujcie się</h2>
<div class="hero-container">
    <p class="waiting-text">Zadanie rozpocznie się po naciśnięciu przycisku.<br>Proszę założyć zestawy EEG i patrzeć na ekran.</p>
    <div id="countdown-wrapper" style="display: none;">
        <div id="countdown" class="countdown animate-scale">5</div>
    </div>
    <div class="animate-slide-2">
        <button type="button" id="start-btn" class="cta-heart-btn">
            <img src="{{ url_for('static', filename='assets/CTA_Button.svg') }}" alt="" class="cta-bg">
            <span class="cta-text">ROZPOCZNIJ<br>BADANIE</span>
        </button>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const countdownWrapper = document.getElementById('countdown-wrapper');
    const counter = document.getElementById('countdown');
    
    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        countdownWrapper.style.display = 'block';
        
        let count = 5;
        const timer = setInterval(() => {
            count--;
            counter.textContent = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = "{{ url_for('task') }}";
            }
        }, 1000);
    });
</script>
{% endblock %}
